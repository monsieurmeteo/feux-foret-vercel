name: Auto Update Feux de Forêt — Temps Réel

  workflow_dispatch:           # déclenché par cron-job.org toutes les 5 min

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Fetch Feux Script
        run: python fetch_feux.py --ci
        env:
          CI: "true"

      - name: Commit and Push Updated Site
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Feux Bot"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/monsieurmeteo/feux-foret-vercel.git"
          git pull --rebase origin main || true
          git add index.html Rapport_Feux_de_Foret_Temps_Reel.pdf data/ || true
          git diff --staged --quiet && echo "Rien à committer" && exit 0
          git commit -m "🔥 Auto-refresh feux $(date -u +'%H:%M UTC') [skip ci]"
          git push
